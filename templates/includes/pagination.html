{% if page_obj.has_other_pages %}
<nav class="pagination" aria-label="Пагинация">
    {% if page_obj.has_previous %}
    <a class="pagination-link" href="?page={{ page_obj.previous_page_number }}{% if query_suffix %}{{ query_suffix }}{% endif %}">Назад</a>
    {% endif %}
    <span class="pagination-current">Страница {{ page_obj.number }} из {{ page_obj.paginator.num_pages }}</span>
    {% if page_obj.has_next %}
    <a class="pagination-link" href="?page={{ page_obj.next_page_number }}{% if query_suffix %}{{ query_suffix }}{% endif %}">Вперёд</a>
    {% endif %}
</nav>
{% endif %}
